query CartValidationsGenerateRunInput {
  cart {
    trustedPhone: attribute(key: "megaska_verified_phone") {
      value
    }
    trustedPhoneVerified: attribute(key: "megaska_phone_verified") {
      value
    }
    buyerIdentity {
      phone
    }
    deliveryGroups {
      deliveryAddress {
        ... on MailingAddress {
          phone
        }
      }
    }
  }
}
