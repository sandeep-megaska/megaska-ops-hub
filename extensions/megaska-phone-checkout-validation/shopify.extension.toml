api_version = "2026-01"

[[extensions]]
name = "megaska-phone-checkout-validation"
handle = "megaska-phone-checkout-validation"
type = "function"
description = "Blocks checkout when checkout phone differs from Megaska verified phone"

  [[extensions.targeting]]
  target = "cart.validations.generate.run"
  input_query = "src/cart_validations_generate_run.graphql"
  export = "cartValidationsGenerateRun"

  [extensions.build]
  command = "shopify app function build"
  path = "dist/index.wasm"
  watch = ["src/**/*.js", "src/**/*.graphql"]
